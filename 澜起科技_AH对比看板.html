    <div class="chart-area" id="chart-compare-pct" style="height:280px;"></div>
  </div>
</div>

<div class="footer">数据来源：Tushare Pro · 港股汇率近似 1 HKD ≈ 0.91 CNY · 港股自 2026年2月9日上市 · 溢价率含休市前值填充</div>

<script>
(function() {
  // Parse data from the separate JSON script block
  var DATA = JSON.parse(document.getElementById('chart-data').textContent);

  var aData = DATA.a_share;
  var hkData = DATA.hk_share;
  var premiumOverlap = DATA.premium;
  var premiumFull = DATA.premium_full;
  var rate = DATA.rate_hkd_cny;

  var upColor = '#e74c3c', downColor = '#2ecc71';
  var upBorder = '#c0392b', downBorder = '#27ae60';

  function fmtDate(s) { return s.substring(0,4)+'-'+s.substring(4,6)+'-'+s.substring(6,8); }

  // --- Header ---
  var aLast = aData[aData.length-1], hkLast = hkData[hkData.length-1];
  var aChg = aLast.pct_chg, hkChg = hkLast.pct_chg;
  var aUp = aChg >= 0, hkUp = hkChg >= 0;
  document.getElementById('header-prices').innerHTML =
    '<div style="display:flex;gap:24px;align-items:baseline;">' +
    '<div><span style="font-size:12px;color:#8ea4c0;">A股</span> <span style="font-size:24px;font-weight:700;color:' + (aUp?upColor:downColor) + '">' + aLast.close.toFixed(2) + '</span> <span style="font-size:13px;color:' + (aUp?upColor:downColor) + '">' + (aUp?'↑':'↓') + aChg.toFixed(2) + '%</span></div>' +
    '<div><span style="font-size:12px;color:#8ea4c0;">港股</span> <span style="font-size:24px;font-weight:700;color:' + (hkUp?upColor:downColor) + '">' + hkLast.close.toFixed(2) + '</span> <span style="font-size:13px;color:' + (hkUp?upColor:downColor) + '">' + (hkUp?'↑':'↓') + hkChg.toFixed(2) + '%</span></div>' +
    '</div>';

  // --- Summary ---
  var premLatest = premiumFull.length ? premiumFull[premiumFull.length-1].premium_pct : 0;
  var premClass = premLatest >= 0 ? 'up' : 'down';
  var premSign = premLatest >= 0 ? '+' : '';
  var hkCloseInCny = hkLast.close * rate;
  document.getElementById('summary-row').innerHTML =
    '<div class="summary-card"><div class="card-label">A股收盘 (CNY)</div><div class="card-value ' + (aUp?'up':'down') + '">' + aLast.close.toFixed(2) + '</div></div>' +
    '<div class="summary-card"><div class="card-label">港股收盘 (HKD)</div><div class="card-value ' + (hkUp?'up':'down') + '">' + hkLast.close.toFixed(2) + '</div></div>' +
    '<div class="summary-card"><div class="card-label">港股折算 CNY</div><div class="card-value">' + hkCloseInCny.toFixed(2) + '</div></div>' +
    '<div class="summary-card"><div class="card-label">AH 溢价率</div><div class="card-value ' + premClass + '">' + premSign + premLatest.toFixed(2) + '%</div></div>' +
    '<div class="summary-card"><div class="card-label">A股数据区间</div><div class="card-value" style="font-size:16px;">' + DATA.a_range + '</div></div>' +
    '<div class="summary-card"><div class="card-label">港股数据区间</div><div class="card-value" style="font-size:16px;">' + DATA.hk_range + '</div></div>';

  // --- K-line helper ---
  function createKlineChart(containerId, data) {
    var dates = data.map(function(d){ return fmtDate(d.date); });
    var candle = data.map(function(d){ return [d.open, d.close, d.low, d.high]; });
    var vol = data.map(function(d){ return {value: d.vol, itemStyle: {color: d.close >= d.open ? upColor : downColor}}; });

    function calcMA(p) {
      return data.map(function(d,i) {
        if (i < p-1) return null;
        var s = 0;
        for (var j=0; j<p; j++) s += data[i-j].close;
        return +(s/p).toFixed(2);
      });
    }

    var chart = echarts.init(document.getElementById(containerId));
    chart.setOption({
      animation: true,
      legend: {top:6, data:['日K','MA5','MA10','MA20'], textStyle:{fontSize:11}},
      tooltip: {
        trigger:'axis', axisPointer:{type:'cross'},
        formatter: function(params) {
          var k = params.filter(function(p){return p.seriesId==='kline'})[0];
          var v = params.filter(function(p){return p.seriesId==='vol'})[0];
          if (!k) return '';
          var o=k.data[0],c=k.data[1],l=k.data[2],h=k.data[3];
          var isUp = c>=o, clr = isUp?upColor:downColor;
          var html = '<b>'+k.axisValue+'</b><br/><span style="color:'+clr+';font-size:16px;font-weight:700">'+c.toFixed(2)+'</span><br/>开'+o.toFixed(2)+'|收<span style="color:'+clr+'">'+c.toFixed(2)+'</span><br/>低'+l.toFixed(2)+'|高'+h.toFixed(2);
          if (v) html += '<br/>量'+(v.data.value/10000).toFixed(1)+'万手';
          return html;
        }
      },
      dataZoom: [
        {type:'inside', xAxisIndex:[0,1], start:50, end:100},
        {show:true, type:'slider', xAxisIndex:[0,1], bottom:'4%', height:20, start:50, end:100, borderColor:'#ddd', fillerColor:'rgba(44,120,215,0.12)', textStyle:{color:'#8492a6'}}
      ],
      grid: [{left:'10%',right:'4%',top:'10%',height:'60%'}, {left:'10%',right:'4%',top:'76%',height:'16%'}],
      xAxis: [
        {type:'category', data:dates, boundaryGap:true, axisLine:{lineStyle:{color:'#e8ecf0'}}, axisLabel:{color:'#8492a6',fontSize:10}, axisTick:{show:false}, gridIndex:0},
        {type:'category', data:dates, boundaryGap:true, axisLine:{show:false}, axisLabel:{show:false}, axisTick:{show:false}, gridIndex:1}
      ],
      yAxis: [
        {type:'value', scale:true, position:'left', axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#8492a6',fontSize:10}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}, gridIndex:0},
        {type:'value', scale:true, position:'left', axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#8492a6',fontSize:10, formatter:function(v){return (v/10000).toFixed(0)+'万'}}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}, gridIndex:1}
      ],
      series: [
        {id:'kline', name:'日K', type:'candlestick', data:candle, xAxisIndex:0, yAxisIndex:0, itemStyle:{color:upColor,color0:downColor,borderColor:upBorder,borderColor0:downBorder}, barMaxWidth:10},
        {name:'MA5', type:'line', data:calcMA(5), smooth:true, showSymbol:false, lineStyle:{width:1,color:'#f39c12'}, xAxisIndex:0, yAxisIndex:0},
        {name:'MA10', type:'line', data:calcMA(10), smooth:true, showSymbol:false, lineStyle:{width:1,color:'#3498db'}, xAxisIndex:0, yAxisIndex:0},
        {name:'MA20', type:'line', data:calcMA(20), smooth:true, showSymbol:false, lineStyle:{width:1,color:'#9b59b6'}, xAxisIndex:0, yAxisIndex:0},
        {id:'vol', name:'成交量', type:'bar', data:vol, xAxisIndex:1, yAxisIndex:1, barMaxWidth:10}
      ]
    });
    return chart;
  }

  // Chart 1 & 2: K-lines
  createKlineChart('chart-a-kline', aData);
  createKlineChart('chart-hk-kline', hkData);

  // Chart 3: 收盘价对比
  var priceChart = echarts.init(document.getElementById('chart-compare-price'));
  var aDates = aData.map(function(d){ return fmtDate(d.date); });
  var aPrices = aData.map(function(d){ return d.close; });
  var hkMap = {};
  hkData.forEach(function(d){ hkMap[d.date] = d.close * rate; });
  var hkPrices = aData.map(function(d){ return hkMap[d.date] != null ? hkMap[d.date] : null; });

  priceChart.setOption({
    animation: true,
    legend: {top:6, data:['A股收盘(CNY)','港股收盘折CNY'], textStyle:{fontSize:12}},
    tooltip: {trigger:'axis', axisPointer:{type:'cross'}},
    dataZoom: [{type:'inside', start:40, end:100}, {show:true, type:'slider', bottom:'4%', height:18, start:40, end:100}],
    grid: {left:'8%', right:'4%', top:'12%', bottom:'16%'},
    xAxis: {type:'category', data:aDates, axisLabel:{color:'#8492a6',fontSize:10}, axisLine:{lineStyle:{color:'#e8ecf0'}}},
    yAxis: {type:'value', scale:true, axisLabel:{color:'#8492a6',fontSize:10,formatter:'{value}'}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}},
    series: [
      {name:'A股收盘(CNY)', type:'line', data:aPrices, smooth:true, showSymbol:false, lineStyle:{width:2,color:'#e74c3c'}, itemStyle:{color:'#e74c3c'}, areaStyle:{color:'rgba(231,76,60,0.06)'}},
      {name:'港股收盘折CNY', type:'line', data:hkPrices, smooth:true, showSymbol:false, lineStyle:{width:2,color:'#2ecc71'}, itemStyle:{color:'#2ecc71'}, connectNulls:true, areaStyle:{color:'rgba(46,204,113,0.06)'}}
    ]
  });

  // Chart 4: AH溢价率 (full with carry-forward)
  var premChart = echarts.init(document.getElementById('chart-premium'));
  var premDates = premiumFull.map(function(d){ return fmtDate(d.date); });
  var premValues = premiumFull.map(function(d){ return d.premium_pct; });

  premChart.setOption({
    animation: true,
    legend: {top:6, data:['AH溢价率'], textStyle:{fontSize:12}},
    tooltip: {
      trigger:'axis',
      formatter: function(params) {
        var p = params[0];
        var v = p.data;
        var clr = v >= 0 ? upColor : downColor;
        var idx = p.dataIndex;
        var item = premiumFull[idx];
        var tag = (item.a_actual && item.hk_actual) ? '两市均交易' : 'A股:' + (item.a_actual?'交易':'休市(前值)') + ' 港股:' + (item.hk_actual?'交易':'休市(前值)');
        return '<b>' + p.axisValue + '</b><br/>AH溢价率: <span style="color:' + clr + ';font-weight:700">' + (v >= 0 ? '+' : '') + v.toFixed(2) + '%</span><br/><span style="font-size:11px;color:#8492a6">' + (v >= 0 ? 'A股 > 港股' : 'A股 < 港股') + ' (' + tag + ')</span>';
      }
    },
    dataZoom: [{type:'inside', start:0, end:100}, {show:true, type:'slider', bottom:'4%', height:18, start:0, end:100}],
    grid: {left:'8%', right:'4%', top:'12%', bottom:'16%'},
    xAxis: {type:'category', data:premDates, axisLabel:{color:'#8492a6',fontSize:10}, axisLine:{lineStyle:{color:'#e8ecf0'}}},
    yAxis: {type:'value', axisLabel:{color:'#8492a6',fontSize:10,formatter:'{value}%'}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}},
    series: [
      {
        name:'AH溢价率', type:'line', data:premValues, smooth:true, showSymbol:false, lineStyle:{width:2.5},
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0,0,0,1,[
            {offset:0, color:'rgba(231,76,60,0.25)'},
            {offset:0.5, color:'rgba(241,196,15,0.08)'},
            {offset:1, color:'rgba(46,204,113,0.25)'}
          ])
        },
        markLine: {
          silent:true,
          data: [{yAxis:0, lineStyle:{color:'#f39c12',type:'dashed',width:1}, label:{formatter:'0%溢价线',color:'#f39c12'}}]
        },
        itemStyle: {
          color: function(params) {
            return params.data >= 0 ? upColor : downColor;
          }
        }
      }
    ]
  });

  // Chart 5: 成交量对比
  var volChart = echarts.init(document.getElementById('chart-compare-vol'));
  var volDates = premiumOverlap.map(function(d){ return fmtDate(d.date); });
  var aVols = premiumOverlap.map(function(d){ return d.a_vol / 10000; });
  var hkVols = premiumOverlap.map(function(d){ return d.hk_vol / 1000000; });

  volChart.setOption({
    animation: true,
    legend: {top:6, data:['A股成交量(万股)','港股成交量(百万股)'], textStyle:{fontSize:12}},
    tooltip: {trigger:'axis'},
    dataZoom: [{type:'inside', start:0, end:100}, {show:true, type:'slider', bottom:'4%', height:16, start:0, end:100}],
    grid: {left:'8%', right:'4%', top:'12%', bottom:'16%'},
    xAxis: {type:'category', data:volDates, axisLabel:{color:'#8492a6',fontSize:10}, axisLine:{lineStyle:{color:'#e8ecf0'}}},
    yAxis: {type:'value', axisLabel:{color:'#8492a6',fontSize:10}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}},
    series: [
      {name:'A股成交量(万股)', type:'bar', data:aVols, itemStyle:{color:'rgba(231,76,60,0.7)'}, barMaxWidth:8},
      {name:'港股成交量(百万股)', type:'bar', data:hkVols, itemStyle:{color:'rgba(46,204,113,0.7)'}, barMaxWidth:8}
    ]
  });

  // Chart 6: 涨跌幅对比
  var pctChart = echarts.init(document.getElementById('chart-compare-pct'));
  var pctDates = premiumOverlap.map(function(d){ return fmtDate(d.date); });
  var aPcts = premiumOverlap.map(function(d){ return d.a_pct_chg; });
  var hkPcts = premiumOverlap.map(function(d){ return d.hk_pct_chg; });

  pctChart.setOption({
    animation: true,
    legend: {top:6, data:['A股涨跌幅%','港股涨跌幅%'], textStyle:{fontSize:12}},
    tooltip: {trigger:'axis'},
    dataZoom: [{type:'inside', start:0, end:100}, {show:true, type:'slider', bottom:'4%', height:16, start:0, end:100}],
    grid: {left:'8%', right:'4%', top:'12%', bottom:'16%'},
    xAxis: {type:'category', data:pctDates, axisLabel:{color:'#8492a6',fontSize:10}, axisLine:{lineStyle:{color:'#e8ecf0'}}},
    yAxis: {type:'value', axisLabel:{color:'#8492a6',fontSize:10,formatter:'{value}%'}, splitLine:{lineStyle:{color:'#f0f2f5',type:'dashed'}}},
    series: [
      {name:'A股涨跌幅%', type:'line', data:aPcts, smooth:true, showSymbol:false, lineStyle:{width:1.5,color:'#e74c3c'}, itemStyle:{color:'#e74c3c'}},
      {name:'港股涨跌幅%', type:'line', data:hkPcts, smooth:true, showSymbol:false, lineStyle:{width:1.5,color:'#2ecc71'}, itemStyle:{color:'#2ecc71'}}
    ]
  });

  // Responsive
  window.addEventListener('resize', function() {
    ['chart-a-kline','chart-hk-kline','chart-compare-price','chart-premium','chart-compare-vol','chart-compare-pct'].forEach(function(id) {
      var inst = echarts.getInstanceByDom(document.getElementById(id));
      if (inst) inst.resize();
    });
  });
})();
</script>

</body>
</html>
